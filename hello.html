<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Time Calculator</title>
    <style>
        :root {
            color-scheme: light;
            --bg: linear-gradient(135deg, #fff8ef 0%, #f3ede3 100%);
            --panel: rgba(255, 255, 255, 0.88);
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #cc3d2f;
            --accent-dark: #9d2f24;
            --border: rgba(31, 41, 55, 0.08);
            --shadow: 0 18px 36px rgba(84, 47, 26, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 18px;
            font-family: Georgia, "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .result {
            margin-top: 18px;
            padding: 14px;
            border-radius: 14px;
            background: #fff7f1;
            border: 1px solid rgba(204, 61, 47, 0.14);
        }

        .speeds {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(31, 41, 55, 0.08);
        }

        .speed-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }

        .speed-row + .speed-row {
            border-top: 1px dashed rgba(31, 41, 55, 0.08);
        }

        .speed-label {
            color: var(--muted);
            font-weight: 700;
        }

        .speed-value {
            color: var(--text);
            font-weight: 700;
        }

        .label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .value {
            display: block;
            margin-top: 6px;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .details,
        .status {
            margin-top: 10px;
            font-size: 13px;
        }

        .status[data-state="error"] {
            color: var(--accent-dark);
        }

        button {
            width: 100%;
            margin-top: 16px;
            border: 0;
            border-radius: 999px;
            padding: 12px 14px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, #e76f51 100%);
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.03);
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>Playlist Time Calculator</h1>
        <p>Open any YouTube playlist page and this popup will total the playlist runtime from the visible page data.</p>

        <div class="result">
            <span class="label">Total watch time</span>
            <span class="value" id="result">--</span>
            <div class="details" id="details"></div>
            <div class="speeds">
                <span class="label">Playback speeds</span>
                <div id="speedList"></div>
            </div>
        </div>

        <button id="refreshButton" type="button">Recalculate</button>
        <div class="status" id="status" data-state="info">Waiting for a YouTube playlist tab.</div>
    </section>
    <script src="popup.js"></script>
</body>
</html>
